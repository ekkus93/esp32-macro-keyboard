name: Materialize mockup assets

on:
  push:
    branches:
      - master
    paths:
      - docs/mockups/.payload/READY

permissions:
  contents: write

jobs:
  materialize:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          ref: master
          fetch-depth: 0

      - name: Decode and extract SVG mockups
        shell: bash
        run: |
          set -euo pipefail
          cat docs/mockups/.payload/part-* > /tmp/mockups.tar.gz.b64
          base64 --decode /tmp/mockups.tar.gz.b64 > /tmp/mockups.tar.gz
          tar -xzf /tmp/mockups.tar.gz -C .

      - name: Render PNG previews
        shell: bash
        run: |
          set -euo pipefail
          python -m pip install --quiet cairosvg
          python - <<'PY'
          from pathlib import Path
          import cairosvg

          for svg in sorted(Path('docs/mockups').glob('*.svg')):
              cairosvg.svg2png(
                  url=str(svg),
                  write_to=str(svg.with_suffix('.png')),
                  output_width=390,
                  output_height=844,
              )
          PY

      - name: Remove one-shot materializer
        shell: bash
        run: |
          rm -rf docs/mockups/.payload
          rm -f .github/workflows/materialize-mockups.yml

      - name: Commit generated assets to master
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A docs/mockups .github/workflows/materialize-mockups.yml
          git commit -m "docs: add web app mockup assets"
          git push origin HEAD:master
