name: Host Tests

on:
  push:
    branches:
      - master
    tags:
      - "**"
  pull_request:
    branches:
      - master
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: host-tests-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  host-tests:
    name: Host Tests
    runs-on: ubuntu-24.04
    timeout-minutes: 15

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install host-test dependencies
        run: |
          sudo apt-get update
          sudo apt-get install --yes --no-install-recommends \
            build-essential \
            cmake \
            libcjson-dev

      - name: Run host tests
        shell: bash
        run: |
          set -o pipefail
          ./scripts/run-tests.sh 2>&1 | tee "${RUNNER_TEMP}/host-tests.log"

      - name: Package tagged host-test assets
        if: startsWith(github.ref, 'refs/tags/')
        shell: bash
        run: |
          set -euo pipefail

          readonly output_dir="artifacts/host-tests"
          readonly build_dir="tests/host/build"

          mkdir -p "${output_dir}"
          cp "${build_dir}/macro_parser_tests" "${output_dir}/"
          cp "${build_dir}/storage_repository_tests" "${output_dir}/"

          if [[ -f "${build_dir}/Testing/Temporary/LastTest.log" ]]; then
            cp "${build_dir}/Testing/Temporary/LastTest.log" "${output_dir}/"
          fi

          printf 'tag=%s\ncommit=%s\nrunner=%s\n' \
            "${GITHUB_REF_NAME}" \
            "${GITHUB_SHA}" \
            "${RUNNER_OS}" \
            > "${output_dir}/BUILD-METADATA.txt"

      - name: Upload tagged host-test assets
        if: startsWith(github.ref, 'refs/tags/')
        uses: actions/upload-artifact@v4
        with:
          name: host-tests-${{ github.ref_name }}-linux-x86_64
          path: artifacts/host-tests/
          if-no-files-found: error
          retention-days: 90

  frontend-tests:
    name: Frontend Tests
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    outputs:
      typecheck_status: ${{ steps.typecheck.outputs.status }}
      typecheck_summary: ${{ steps.typecheck.outputs.summary }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          show-progress: false

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24.18.0

      - name: Install frontend dependencies
        run: npm --prefix webapp install --ignore-scripts --no-audit --no-fund

      - name: Type-check frontend
        id: typecheck
        shell: bash
        run: |
          set +e
          output="$(npm --prefix webapp run typecheck 2>&1)"
          status=$?
          printf '%s\n' "${output}"
          summary="$(printf '%s\n' "${output}" | grep -E 'error TS[0-9]+:' | head -n 3 | tr '\n' ' ')"
          summary="${summary:0:240}"
          printf 'status=%s\n' "${status}" >> "${GITHUB_OUTPUT}"
          printf 'summary=%s\n' "${summary}" >> "${GITHUB_OUTPUT}"

      - name: Fail on type-check findings
        if: steps.typecheck.outputs.status != '0'
        run: exit 1

      - name: Lint frontend TypeScript
        run: npm --prefix webapp run lint

      - name: Lint frontend styles
        run: npm --prefix webapp run stylelint

      - name: Check frontend formatting
        run: npm --prefix webapp run format:check

      - name: Run frontend tests
        run: npm --prefix webapp test

  frontend-typecheck-diagnostic:
    name: "TypeScript: ${{ needs.frontend-tests.outputs.typecheck_summary }}"
    needs: frontend-tests
    if: always() && needs.frontend-tests.outputs.typecheck_status != '0'
    runs-on: ubuntu-24.04
    steps:
      - name: Preserve type-check failure
        run: exit 1
