name: Device Test Build

on:
  push:
    branches:
      - master
    tags:
      - "**"
  pull_request:
    branches:
      - master
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: device-tests-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-device-tests:
    name: Build ESP32-S3 Device Tests
    runs-on: ubuntu-24.04
    timeout-minutes: 45

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install test lint tools
        run: |
          sudo apt-get update
          sudo apt-get install --yes --no-install-recommends clang-format

      - name: Lint device-test sources
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p artifacts/ci
          mapfile -d '' sources < <(
            find firmware/test_app/main -maxdepth 1 -type f -name '*.c' -print0 | sort -z
          )
          if (( ${#sources[@]} == 0 )); then
            echo "No device-test C sources were found." \
              | tee artifacts/ci/device-test-lint.log >&2
            exit 1
          fi
          clang-format --dry-run --Werror "${sources[@]}" \
            2>&1 | tee artifacts/ci/device-test-lint.log

      - name: Upload device-test lint diagnostics
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: device-test-lint-failure-${{ github.run_id }}
          path: artifacts/ci/device-test-lint.log
          if-no-files-found: error
          retention-days: 14

      - name: Install ESP-IDF v5.5.5
        shell: bash
        run: |
          set -euo pipefail
          readonly log_file="${RUNNER_TEMP}/esp-idf-install.log"
          if ! ./scripts/install-esp-idf.sh >"${log_file}" 2>&1; then
            echo "ESP-IDF installation failed. Relevant log tail:" >&2
            tail -n 250 "${log_file}" >&2
            exit 1
          fi
          tail -n 20 "${log_file}"

      - name: Build device-test firmware
        shell: bash
        run: |
          set -euo pipefail
          . "$HOME/esp/esp-idf-v5.5.5/export.sh" >/dev/null
          mkdir -p artifacts/ci
          readonly log_file="artifacts/ci/device-test-build.log"
          if ! bash ./scripts/build-device-tests.sh >"${log_file}" 2>&1; then
            echo "ESP32-S3 device-test build failed. Compiler diagnostics:" >&2
            grep -E -i -n -C 2 \
              '(^|[[:space:]])(fatal error|error:|undefined reference|FAILED:|CMake Error)' \
              "${log_file}" >&2 || true
            echo "Complete build log tail:" >&2
            tail -n 300 "${log_file}" >&2
            exit 1
          fi
          tail -n 40 "${log_file}"

      - name: Upload device-test build diagnostics
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: device-test-build-failure-${{ github.run_id }}
          path: artifacts/ci/device-test-build.log
          if-no-files-found: ignore
          retention-days: 14

      - name: Package tagged device-test assets
        if: startsWith(github.ref, 'refs/tags/')
        shell: bash
        run: |
          set -euo pipefail

          readonly build_dir="firmware/test_app/build"
          readonly output_dir="artifacts/device-tests"

          mkdir -p "${output_dir}/bootloader" "${output_dir}/partition_table"
          cp "${build_dir}/esp32_macro_keyboard_device_tests.bin" "${output_dir}/"
          cp "${build_dir}/esp32_macro_keyboard_device_tests.elf" "${output_dir}/"
          cp "${build_dir}/flasher_args.json" "${output_dir}/"
          cp "${build_dir}/bootloader/bootloader.bin" "${output_dir}/bootloader/"
          cp "${build_dir}/partition_table/partition-table.bin" \
            "${output_dir}/partition_table/"

          printf 'tag=%s\ncommit=%s\ntarget=esp32s3\nesp_idf=v5.5.5\n' \
            "${GITHUB_REF_NAME}" \
            "${GITHUB_SHA}" \
            > "${output_dir}/BUILD-METADATA.txt"

      - name: Upload tagged device-test assets
        if: startsWith(github.ref, 'refs/tags/')
        uses: actions/upload-artifact@v4
        with:
          name: device-tests-${{ github.ref_name }}-esp32s3
          path: artifacts/device-tests/
          if-no-files-found: error
          retention-days: 90
